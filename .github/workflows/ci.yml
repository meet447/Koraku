name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[all,dev]"
      - run: pytest

  koraku-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/koraku-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  web:
    runs-on: ubuntu-latest
    needs: koraku-client
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix ../packages/koraku-client && npm run build --prefix ../packages/koraku-client
      - run: npm ci
      - run: npm run build
